name: FBOX Telegram Bot

on:
  schedule:
    # Ejecutar cada 1 hora para chequeos regulares
    - cron: '0 * * * *'
    # Ejecutar cada lunes a las 00:00 UTC para generar Excel semanal
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Permite ejecución manual
    inputs:
      test_alert:
        description: 'Enviar alerta de prueba a Telegram'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  # Variable para identificar si es ejecución semanal (lunes)
  IS_MONDAY: ${{ github.event.schedule == '0 0 * * 1' }}

jobs:
  check-fbox:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4
    
    - name: Restaurar archivos de estado previos
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: fbox-state-files
        path: .
    
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt
    
    - name: Crear archivo .env
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        FBOX_USERNAME: ${{ secrets.FBOX_USERNAME }}
        FBOX_PASSWORD: ${{ secrets.FBOX_PASSWORD }}
        FBOX_SSID: ${{ secrets.FBOX_SSID }}
        FBOX_ADMIN_TOKEN: ${{ secrets.FBOX_ADMIN_TOKEN }}
      run: |
        cat > .env << EOF
        BOT_TOKEN=$BOT_TOKEN
        CHAT_ID=$CHAT_ID
        FBOX_USERNAME=$FBOX_USERNAME
        FBOX_PASSWORD=$FBOX_PASSWORD
        FBOX_SSID=$FBOX_SSID
        FBOX_ADMIN_TOKEN=$FBOX_ADMIN_TOKEN
        DROPBOX_PATH=
        EOF
    
    - name: Enviar alerta de prueba
      if: github.event.inputs.test_alert == 'true'
      run: |
        python fbox_telegram.py --test

    - name: Ejecutar bot FBOX
      if: github.event.inputs.test_alert != 'true'
      run: |
        python fbox_telegram.py
    
    - name: Generar reporte Excel semanal
      if: github.event.schedule == '0 0 * * 1'
      run: |
        pip install openpyxl
        python generate_excel_report.py
    
    - name: Guardar archivos de estado
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: fbox-state-files
        path: |
          fbox_state.json
          fbox_history.json
          fbox_alerts_history.json
          last_report_time.json
          last_weekly_report.json
        retention-days: 7
    
    - name: Subir reporte Excel
      uses: actions/upload-artifact@v4
      if: github.event.schedule == '0 0 * * 1'
      with:
        name: fbox-weekly-reports
        path: FBOX_Report_*.xlsx
        retention-days: 30
